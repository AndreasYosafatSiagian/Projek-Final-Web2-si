<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: header}">
    <title>Dashboard</title>
</head>

<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-4">

    <h2 class="mb-4">Dashboard</h2>

    <!-- EMPTY STATE -->
    <div th:if="${totalProduct == 0}" class="alert alert-info">
        Belum ada produk. Yuk mulai tambah produk pertama kamu 🚀
        <a href="/products/new" class="btn btn-primary btn-sm ms-2">Tambah Produk</a>
    </div>

    <!-- STATS CARDS -->
    <div class="row g-3">

        <!-- TOTAL PRODUCT -->
        <div class="col-md-3">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h6>Total Produk</h6>
                    <h3 th:text="${totalProduct}">0</h3>
                </div>
            </div>
        </div>

        <!-- TOTAL VALUE -->
        <div class="col-md-3">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h6>Total Inventory</h6>
                    <h4 th:text="${'Rp ' + #numbers.formatDecimal(totalValue, 0, 'POINT', 0, 'COMMA')}">
                        Rp 0
                    </h4>
                </div>
            </div>
        </div>

        <!-- ACTIVE -->
        <div class="col-md-3">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h6>Produk Aktif</h6>
                    <h3 class="text-success" th:text="${active}">0</h3>
                </div>
            </div>
        </div>

        <!-- INACTIVE -->
        <div class="col-md-3">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h6>Produk Tidak Aktif</h6>
                    <h3 class="text-danger" th:text="${inactive}">0</h3>
                </div>
            </div>
        </div>

    </div>

    <!-- CATEGORY SECTION -->
    <div class="card mt-4 shadow-sm">
        <div class="card-header bg-dark text-white">
            Produk per Kategori
        </div>

        <div class="card-body">

            <div class="row">

                <div class="col-md-6"
                     th:each="c : ${categories}">

                    <div class="d-flex justify-content-between border-bottom py-2">

                        <span th:text="${c.key}">Kategori</span>

                        <span class="badge bg-primary"
                              th:text="${c.value}">0</span>

                    </div>

                </div>

            </div>

        </div>
    </div>

    <!-- LOW STOCK -->
    <div class="card mt-4 shadow-sm">

        <div class="card-header bg-danger text-white">
            Low Stock (stok < 5)
        </div>

        <div class="card-body">

            <table class="table table-sm">

                <thead>
                <tr>
                    <th>Nama</th>
                    <th>Stock</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="p : ${lowStock}">
                    <td th:text="${p.name}"></td>
                    <td>
                        <span class="badge bg-warning text-dark"
                              th:text="${p.stock}"></span>
                    </td>
                </tr>

                <tr th:if="${lowStock == null or lowStock.isEmpty()}">
                    <td colspan="2" class="text-center text-muted">
                        Tidak ada produk low stock 🎉
                    </td>
                </tr>

                </tbody>

            </table>

        </div>
    </div>

</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
