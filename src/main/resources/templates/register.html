<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Product CRUD</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center px-4">

<div class="w-full max-w-md bg-white rounded-lg shadow-lg p-8">

    <h3 class="text-2xl font-bold text-center mb-6">Register</h3>

    <!-- Error message -->
    <div th:if="${error}"
         class="mb-4 p-3 rounded bg-red-100 text-red-700 text-sm"
         th:text="${error}">
    </div>

    <form th:action="@{/register}"
          th:object="${registerRequest}"
          method="post"
          class="space-y-4">

        <div>
            <label for="username"
                   class="block text-sm font-medium text-gray-700 mb-1">
                Username
            </label>
            <input type="text"
                   id="username"
                   th:field="*{username}"
                   placeholder="Masukkan username"
                   required
                   autofocus
                   class="w-full px-4 py-2 border rounded-lg
                          focus:ring-2 focus:ring-green-500 focus:outline-none">
        </div>

        <div>
            <label for="password"
                   class="block text-sm font-medium text-gray-700 mb-1">
                Password
            </label>
            <input type="password"
                   id="password"
                   th:field="*{password}"
                   placeholder="Masukkan password"
                   required
                   class="w-full px-4 py-2 border rounded-lg
                          focus:ring-2 focus:ring-green-500 focus:outline-none">
        </div>

        <div>
            <label for="confirmPassword"
                   class="block text-sm font-medium text-gray-700 mb-1">
                Konfirmasi Password
            </label>
            <input type="password"
                   id="confirmPassword"
                   th:field="*{confirmPassword}"
                   placeholder="Ulangi password"
                   required
                   class="w-full px-4 py-2 border rounded-lg
                          focus:ring-2 focus:ring-green-500 focus:outline-none">
        </div>

        <button type="submit"
                class="w-full bg-green-600 text-white py-2 rounded-lg
                       font-semibold hover:bg-green-700 transition">
            Daftar
        </button>
    </form>

    <div class="text-center mt-4 text-sm text-gray-600">
        Sudah punya akun?
        <a th:href="@{/login}" class="text-blue-600 hover:underline">
            Login di sini
        </a>
    </div>

</div>

</body>
</html>
