<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="header">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product CRUD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container {
            margin-top: 20px;
            margin-bottom: 20px;
        }
        .table {
            vertical-align: middle;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<div th:fragment="navbar">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">

            <a class="navbar-brand" href="/products">Product CRUD</a>

            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto align-items-center">

                    <!-- Username - langsung dari authentication (tidak perlu dikirim dari controller) -->
                    <li class="nav-item me-3">
                        <span class="navbar-text text-white">
                            Halo, <b th:text="${#authentication.name}">User</b>
                        </span>
                    </li>

                    <!-- Profile -->
                    <li class="nav-item">
                        <a class="nav-link" href="/profile">Profile</a>
                    </li>

                    <!-- Logout -->
                    <li class="nav-item">
                        <a class="nav-link" href="/logout">Logout</a>
                    </li>

                </ul>
            </div>

        </div>
    </nav>
</div>

<!-- FOOTER -->
<div th:fragment="footer">
    <footer class="text-center mt-5 py-3 bg-light">
        <p class="mb-0">© 2026 Product CRUD - All Rights Reserved</p>
    </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
