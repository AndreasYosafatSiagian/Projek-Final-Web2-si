<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}">
    <title>Daftar Produk</title>
</head>

<body class="bg-gray-100 min-h-screen">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="max-w-7xl mx-auto px-4 mt-8">

    <!-- HEADER -->
    <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 mb-6">
        <h2 class="text-2xl font-semibold text-gray-800">Daftar Produk</h2>
        <a th:href="@{/products/new}"
           class="bg-green-600 text-white px-4 py-2 rounded-md hover:bg-green-700 transition">
            + Tambah Produk Baru
        </a>
    </div>

    <!-- ALERT -->
    <div th:if="${successMessage}"
         class="mb-4 bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded">
        <span th:text="${successMessage}"></span>
    </div>

    <div th:if="${errorMessage}"
         class="mb-4 bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">
        <span th:text="${errorMessage}"></span>
    </div>

    <!-- FILTER -->
    <div class="bg-white rounded-lg shadow mb-6">
        <div class="border-b px-6 py-3 font-semibold">🔍 Filter Produk</div>

        <form method="get" th:action="@{/products}"
              class="p-6 grid grid-cols-1 md:grid-cols-4 gap-4">

            <div>
                <label class="block text-sm text-gray-700 mb-1">Cari Nama</label>
                <input type="text" name="search" th:value="${search}"
                       class="w-full border rounded px-3 py-2 focus:ring focus:ring-blue-300"
                       placeholder="Ketik nama produk...">
            </div>

            <div>
                <label class="block text-sm text-gray-700 mb-1">Kategori</label>
                <select name="categoryId"
                        class="w-full border rounded px-3 py-2 focus:ring focus:ring-blue-300">
                    <option value="">-- Semua Kategori --</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}"
                            th:selected="${categoryId != null and categoryId == cat.id}">
                    </option>
                </select>
            </div>

            <div>
                <label class="block text-sm text-gray-700 mb-1">Status</label>
                <select name="active"
                        class="w-full border rounded px-3 py-2 focus:ring focus:ring-blue-300">
                    <option value="">-- Semua --</option>
                    <option value="true" th:selected="${activeFilter == true}">Aktif</option>
                    <option value="false" th:selected="${activeFilter == false}">Tidak Aktif</option>
                </select>
            </div>

            <div class="flex items-end gap-2">
                <button type="submit"
                        class="flex-1 bg-blue-600 text-white py-2 rounded hover:bg-blue-700">
                    Cari
                </button>
                <a th:href="@{/products}"
                   class="flex-1 bg-gray-500 text-white py-2 rounded text-center hover:bg-gray-600">
                    Reset
                </a>
            </div>
        </form>
    </div>

    <!-- INFO -->
    <div class="flex flex-wrap justify-between text-sm text-gray-600 mb-4">
        <p>
            Menampilkan <strong th:text="${products.size()}"></strong> dari
            <strong th:text="${totalItems}"></strong> produk
        </p>
        <p th:if="${search != null and search != ''}">
            Hasil pencarian: "<strong th:text="${search}"></strong>"
        </p>
    </div>

    <!-- TABLE -->
    <div th:if="${!#lists.isEmpty(products)}"
         class="bg-white rounded-lg shadow overflow-x-auto">

        <table class="min-w-full border">
            <thead class="bg-gray-800 text-white">
            <tr>
                <th class="px-4 py-3 text-left">No</th>
                <th class="px-4 py-3 text-left">Nama</th>
                <th class="px-4 py-3 text-left">Kategori</th>
                <th class="px-4 py-3">Harga</th>
                <th class="px-4 py-3">Stok</th>
                <th class="px-4 py-3">Status</th>
                <th class="px-4 py-3 text-center">Aksi</th>
            </tr>
            </thead>

            <tbody class="divide-y">
            <tr th:each="product, iterStat : ${products}" class="hover:bg-gray-50">
                <td class="px-4 py-2"
                    th:text="${iterStat.index + 1 + (currentPage - 1) * pageSize}"></td>

                <td class="px-4 py-2 font-medium" th:text="${product.name}"></td>

                <td class="px-4 py-2">
                    <span th:if="${product.category != null}"
                          th:text="${product.category.name}"
                          class="bg-blue-100 text-blue-700 text-xs px-2 py-1 rounded"></span>
                    <span th:unless="${product.category != null}"
                          class="bg-gray-200 text-gray-700 text-xs px-2 py-1 rounded">
                        Tidak Berkategori
                    </span>
                </td>

                <td class="px-4 py-2" th:text="${'Rp ' + product.price}"></td>
                <td class="px-4 py-2" th:text="${product.stock}"></td>

                <td class="px-4 py-2">
                    <span th:if="${product.active}"
                          class="bg-green-100 text-green-700 text-xs px-2 py-1 rounded">
                        Aktif
                    </span>
                    <span th:unless="${product.active}"
                          class="bg-red-100 text-red-700 text-xs px-2 py-1 rounded">
                        Tidak Aktif
                    </span>
                </td>

                <td class="px-4 py-2 text-center space-x-1">
                    <a th:href="@{/products/{id}(id=${product.id})}"
                       class="bg-blue-500 text-white px-2 py-1 rounded text-xs hover:bg-blue-600">
                        Detail
                    </a>
                    <a th:href="@{/products/{id}/edit(id=${product.id})}"
                       class="bg-yellow-500 text-white px-2 py-1 rounded text-xs hover:bg-yellow-600">
                        Edit
                    </a>
                    <form th:action="@{/products/{id}/delete(id=${product.id})}"
                          method="post" class="inline">
                        <button type="submit"
                                onclick="return confirm('Apakah Anda yakin ingin menghapus produk ini?')"
                                class="bg-red-600 text-white px-2 py-1 rounded text-xs hover:bg-red-700">
                            Hapus
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- EMPTY -->
    <div th:if="${#lists.isEmpty(products)}"
         class="bg-blue-100 border border-blue-300 text-blue-700 px-6 py-6 rounded text-center mt-6">
        <p>Tidak ada produk yang ditemukan.</p>
    </div>

</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
