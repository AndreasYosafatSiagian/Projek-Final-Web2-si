<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}">
    <title>Daftar Kategori</title>
</head>
<body class="bg-gray-100 min-h-screen">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="max-w-6xl mx-auto px-4 mt-8">

    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 mb-6">
        <h2 class="text-2xl font-semibold text-gray-800">
            Daftar Kategori
        </h2>
        <a th:href="@{/categories/new}"
           class="bg-green-600 text-white px-4 py-2 rounded-md
                  hover:bg-green-700 transition">
            + Tambah Kategori Baru
        </a>
    </div>

    <!-- Success Message -->
    <div th:if="${successMessage}"
         class="mb-4 bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded">
        <span th:text="${successMessage}"></span>
    </div>

    <!-- Error Message -->
    <div th:if="${errorMessage}"
         class="mb-4 bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">
        <span th:text="${errorMessage}"></span>
    </div>

    <!-- Table -->
    <div th:if="${!#lists.isEmpty(categories)}"
         class="overflow-x-auto bg-white rounded-lg shadow">

        <table class="min-w-full border border-gray-200">
            <thead class="bg-gray-800 text-white">
            <tr>
                <th class="px-4 py-3 text-left text-sm font-medium">No</th>
                <th class="px-4 py-3 text-left text-sm font-medium">Nama Kategori</th>
                <th class="px-4 py-3 text-left text-sm font-medium">Deskripsi</th>
                <th class="px-4 py-3 text-center text-sm font-medium">Aksi</th>
            </tr>
            </thead>

            <tbody class="divide-y divide-gray-200">
            <tr th:each="cat, iterStat : ${categories}" class="hover:bg-gray-50">
                <td class="px-4 py-2" th:text="${iterStat.index + 1}">1</td>
                <td class="px-4 py-2 font-medium" th:text="${cat.name}">Nama</td>
                <td class="px-4 py-2 text-gray-600"
                    th:text="${cat.description != null ? cat.description : '-'}">
                    Deskripsi
                </td>
                <td class="px-4 py-2 text-center space-x-2">

                    <a th:href="@{/categories/edit/{id}(id=${cat.id})}"
                       class="inline-block bg-yellow-500 text-white px-3 py-1 rounded-md text-sm
                              hover:bg-yellow-600 transition">
                        Edit
                    </a>

                    <form th:action="@{/categories/delete/{id}(id=${cat.id})}"
                          method="post"
                          class="inline">
                        <button type="submit"
                                onclick="return confirm('Apakah Anda yakin ingin menghapus kategori ini?')"
                                class="bg-red-600 text-white px-3 py-1 rounded-md text-sm
                                       hover:bg-red-700 transition">
                            Hapus
                        </button>
                    </form>

                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Empty State -->
    <div th:if="${#lists.isEmpty(categories)}"
         class="mt-10 bg-blue-100 border border-blue-300 text-blue-700 px-6 py-4 rounded text-center">
        <p>Belum ada kategori. Silakan tambah kategori baru!</p>
    </div>

</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
