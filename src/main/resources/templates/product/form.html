<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}">
    <title>Form Produk</title>
</head>
<body class="bg-gray-100 min-h-screen">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="flex justify-center mt-10 px-4">
    <div class="w-full max-w-lg bg-white rounded-lg shadow-md">

        <!-- HEADER -->
        <div class="bg-blue-600 text-white px-6 py-4 rounded-t-lg">
            <h4 class="text-lg font-semibold"
                th:text="${product.id} ? 'Edit Produk' : 'Tambah Produk Baru'">
            </h4>
        </div>

        <!-- BODY -->
        <div class="p-6">

            <!-- ERROR MESSAGE -->
            <div th:if="${errorMessage}"
                 class="mb-4 bg-red-100 text-red-700 px-3 py-2 rounded">
                <span th:text="${errorMessage}"></span>
            </div>

            <form th:action="@{/products/save}"
                  th:object="${product}"
                  method="post"
                  class="space-y-4">

                <input type="hidden" th:field="*{id}"/>

                <!-- NAMA -->
                <div>
                    <label class="block text-sm font-medium mb-1">Nama Produk</label>
                    <input type="text"
                           th:field="*{name}"
                           required
                           class="w-full border px-3 py-2 rounded focus:ring-2 focus:ring-blue-500">
                </div>

                <!-- KATEGORI -->
                <div>
                    <label class="block text-sm font-medium mb-1">Kategori</label>
                    <select name="categoryId"
                            class="w-full border px-3 py-2 rounded focus:ring-2 focus:ring-blue-500">
                        <option value="">-- Pilih Kategori --</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${cat.name}"
                                th:selected="${product.category != null and product.category.id == cat.id}">
                        </option>
                    </select>
                </div>

                <!-- HARGA -->
                <div>
                    <label class="block text-sm font-medium mb-1">Harga (Rp)</label>
                    <input type="number"
                           th:field="*{price}"
                           min="0"
                           step="1000"
                           required
                           class="w-full border px-3 py-2 rounded focus:ring-2 focus:ring-blue-500">
                </div>

                <!-- STOK -->
                <div>
                    <label class="block text-sm font-medium mb-1">Stok</label>
                    <input type="number"
                           th:field="*{stock}"
                           min="0"
                           required
                           class="w-full border px-3 py-2 rounded focus:ring-2 focus:ring-blue-500">
                </div>

                <!-- DESKRIPSI -->
                <div>
                    <label class="block text-sm font-medium mb-1">Deskripsi</label>
                    <textarea th:field="*{description}"
                              rows="3"
                              class="w-full border px-3 py-2 rounded focus:ring-2 focus:ring-blue-500"></textarea>
                </div>

                <!-- STATUS -->
                <div class="flex items-center gap-2">
                    <input type="checkbox"
                           th:field="*{active}"
                           class="h-4 w-4">
                    <label class="text-sm">Produk Aktif</label>
                </div>

                <!-- TANGGAL -->
                <div>
                    <label class="block text-sm font-medium mb-1">Tanggal Dibuat</label>
                    <input type="date"
                           th:field="*{createdAt}"
                           required
                           class="w-full border px-3 py-2 rounded focus:ring-2 focus:ring-blue-500">
                </div>

                <!-- BUTTON -->
                <div class="flex gap-3 pt-2">

                    <button type="submit"
                            class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                        Simpan
                    </button>

                    <a th:href="@{/products}"
                       class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600">
                        Batal
                    </a>

                </div>

            </form>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
