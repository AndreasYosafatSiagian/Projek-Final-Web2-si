<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- ================= HEADER ================= -->
<head th:fragment="header">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product CRUD</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>

<!-- ================= NAVBAR ================= -->
<div th:fragment="navbar">
    <nav class="bg-blue-600">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between h-16 items-center">

                <!-- Logo -->
                <a th:href="@{/}" class="text-white font-bold text-lg">
                    Product CRUD
                </a>

                <!-- Menu -->
                <div class="hidden md:flex items-center space-x-6">
                    <a th:href="@{/home}" class="text-white hover:text-gray-200">Home</a>
                    <a th:href="@{/dashboard}" class="text-white hover:text-gray-200">Dashboard</a>
                    <a th:href="@{/products}" class="text-white hover:text-gray-200">Products</a>
                    <a th:href="@{/categories}" class="text-white hover:text-gray-200">Categories</a>

                    <!-- User Dropdown -->
                    <div class="relative group py-2">
                        <button class="flex items-center gap-1 text-white focus:outline-none">
                            Halo, <span th:text="${#authentication.name}">User</span>
                        </button>

                        <!-- Dropdown Menu -->
                        <div class="absolute right-0 top-full w-44 bg-white rounded-md shadow-lg
                                    opacity-0 invisible
                                    group-hover:opacity-100 group-hover:visible
                                    transition duration-200 z-50">

                            <a th:href="@{/user/profile}"
                               class="block px-4 py-2 text-gray-700 hover:bg-gray-100 rounded-t-md">
                                My Profile
                            </a>

                            <form th:action="@{/logout}" method="post">
                                <button type="submit"
                                        class="w-full text-left px-4 py-2 text-red-600 hover:bg-red-100 rounded-b-md">
                                    Logout
                                </button>
                            </form>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </nav>
</div>

<!-- ================= FOOTER ================= -->
<div th:fragment="footer">
    <footer class="mt-10 text-center text-gray-500 py-4">
        © 2026 Product CRUD
    </footer>
</div>

</body>
</html>
