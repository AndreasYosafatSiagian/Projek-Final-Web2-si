<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Daftar Produk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Daftar Produk</h2>
        <a th:href="@{/products/new}" class="btn btn-success">
            + Tambah Produk Baru
        </a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success">
        <span th:text="${successMessage}"></span>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger">
        <span th:text="${errorMessage}"></span>
    </div>

    <p class="text-muted">
        Total produk: <strong th:text="${#lists.size(products)}">0</strong>
    </p>

    <div th:if="${!#lists.isEmpty(products)}">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>No</th>
                <th>Nama</th>
                <th>Kategori</th>
                <th>Harga</th>
                <th>Stok</th>
                <th>Status</th>
                <th>Aksi</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="product, iterStat : ${products}">
                <td th:text="${iterStat.index + 1}"></td>
                <td th:text="${product.name}"></td>
                <td th:text="${product.category?.displayName}"></td>
                <td th:text="${product.price}"></td>
                <td th:text="${product.stock}"></td>
                <td>
                    <span th:if="${product.active}" class="badge bg-success">Aktif</span>
                    <span th:unless="${product.active}" class="badge bg-danger">Tidak Aktif</span>
                </td>
                <td>
                    <a th:href="@{/products/{id}(id=${product.id})}" class="btn btn-info btn-sm">Detail</a>
                    <a th:href="@{/products/{id}/edit(id=${product.id})}" class="btn btn-warning btn-sm">Edit</a>
                    <form th:action="@{/products/{id}/delete(id=${product.id})}" method="post"
                          style="display:inline;">
                        <button class="btn btn-danger btn-sm"
                                onclick="return confirm('Hapus produk ini?')">Hapus</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${#lists.isEmpty(products)}" class="text-center py-5">
        <p class="text-muted">Belum ada produk.</p>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
