<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}">
    <title>Detail Produk</title>
</head>
<body class="bg-gray-100 min-h-screen">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="max-w-4xl mx-auto px-4 mt-8">

    <!-- HEADER -->
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-semibold text-gray-800"
            th:text="${product.name}">
        </h2>

        <a th:href="@{/products}"
           class="text-sm bg-gray-500 text-white px-3 py-1 rounded hover:bg-gray-600">
            ← Kembali
        </a>
    </div>

    <!-- CARD -->
    <div class="bg-white rounded-lg shadow">
        <div class="p-6">

            <table class="w-full text-sm">
                <tbody class="divide-y">

                <tr>
                    <th class="py-3 text-gray-500 w-40">Nama</th>
                    <td th:text="${product.name}"></td>
                </tr>

                <tr>
                    <th class="py-3 text-gray-500">Kategori</th>
                    <td>
                        <span th:if="${product.category != null}"
                              th:text="${product.category.name}"
                              class="bg-blue-100 text-blue-700 px-2 py-1 rounded text-xs"></span>

                        <span th:unless="${product.category != null}"
                              class="bg-gray-200 text-gray-700 px-2 py-1 rounded text-xs">
                            Tidak Berkategori
                        </span>
                    </td>
                </tr>

                <!-- BARIS YANG DIPERBAIKI - OPSI 1 -->
                <tr>
                    <th class="py-3 text-gray-500">Harga</th>
                    <td th:text="'Rp ' + ${#numbers.formatInteger(product.price, 3, 'COMMA')}"></td>
                </tr>

                <tr>
                    <th class="py-3 text-gray-500">Stok</th>
                    <td th:text="${product.stock}"></td>
                </tr>

                <tr>
                    <th class="py-3 text-gray-500">Status</th>
                    <td>
                        <span th:if="${product.active}"
                              class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs">
                            Aktif
                        </span>

                        <span th:unless="${product.active}"
                              class="bg-red-100 text-red-700 px-2 py-1 rounded text-xs">
                            Tidak Aktif
                        </span>
            </table>
            </tr>

            <tr>
                <th class="py-3 text-gray-500">Tanggal Dibuat</th>
                <td th:text="${#temporals.format(product.createdAt, 'dd MMM yyyy')}"></td>
            </tr>

            <tr>
                <th class="py-3 text-gray-500">Deskripsi</th>
                <td th:text="${product.description != null && product.description != '' ? product.description : '-'}"></td>
            </tr>

            </tbody>
            </table>

        </div>
    </div>

    <!-- ACTION BUTTON -->
    <div class="flex gap-3 mt-6">

        <a th:href="@{/products/{id}/edit(id=${product.id})}"
           class="bg-yellow-500 text-white px-4 py-2 rounded hover:bg-yellow-600">
            Edit
        </a>

        <form th:action="@{/products/{id}/delete(id=${product.id})}"
              method="post"
              onsubmit="return confirm('Yakin hapus produk ini?')">
            <button type="submit"
                    class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">
                Hapus
            </button>
        </form>

    </div>

</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
