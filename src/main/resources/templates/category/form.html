<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}">
    <title>Form Kategori</title>
</head>
<body class="bg-gray-100 min-h-screen">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="flex justify-center mt-10 px-4">
    <div class="w-full max-w-lg bg-white rounded-lg shadow-md">

        <!-- Header -->
        <div class="bg-blue-600 text-white px-6 py-4 rounded-t-lg">
            <h4 class="text-lg font-semibold"
                th:text="${category.id == null} ? 'Tambah Kategori Baru' : 'Edit Kategori'">
                Form Kategori
            </h4>
        </div>

        <!-- Body -->
        <div class="p-6">

            <!-- Error Message -->
            <div th:if="${errorMessage}"
                 class="mb-4 bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative">
                <span th:text="${errorMessage}"></span>
            </div>

            <form th:action="@{/categories/save}" th:object="${category}" method="post" class="space-y-4">

                <input type="hidden" th:field="*{id}" />

                <!-- Nama Kategori -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Nama Kategori
                    </label>
                    <input type="text"
                           th:field="*{name}"
                           required
                           class="w-full px-3 py-2 border border-gray-300 rounded-md
                                  focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <p class="text-sm text-gray-500 mt-1">
                        Nama kategori harus unik per user
                    </p>
                </div>

                <!-- Deskripsi -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Deskripsi
                    </label>
                    <textarea th:field="*{description}"
                              rows="3"
                              class="w-full px-3 py-2 border border-gray-300 rounded-md
                                     focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>

                <!-- Button -->
                <div class="flex gap-3 pt-2">
                    <button type="submit"
                            class="bg-blue-600 text-white px-4 py-2 rounded-md
                                   hover:bg-blue-700 transition">
                        Simpan
                    </button>

                    <a th:href="@{/categories}"
                       class="bg-gray-500 text-white px-4 py-2 rounded-md
                              hover:bg-gray-600 transition">
                        Batal
                    </a>
                </div>

            </form>

        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
