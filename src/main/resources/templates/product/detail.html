<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}">
    <title>Detail Produk</title>
</head>
<body class="bg-gray-100 min-h-screen">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="max-w-4xl mx-auto px-4 mt-8">

    <!-- Product Name -->
    <h2 class="text-2xl font-semibold text-gray-800 mb-6"
        th:text="${product.name}">
        Nama Produk
    </h2>

    <!-- Detail Card -->
    <div class="bg-white rounded-lg shadow">
        <div class="p-6">
            <table class="w-full text-sm text-left">
                <tbody class="divide-y divide-gray-200">

                <tr>
                    <th class="py-3 pr-4 text-gray-500 w-48">Nama</th>
                    <td class="py-3" th:text="${product.name}">-</td>
                </tr>

                <tr>
                    <th class="py-3 pr-4 text-gray-500">Kategori</th>
                    <td class="py-3">
                        <span th:if="${product.category != null}"
                              th:text="${product.category.name}"
                              class="inline-block bg-blue-100 text-blue-700 text-xs px-2 py-1 rounded">
                            Nama Kategori
                        </span>
                        <span th:unless="${product.category != null}"
                              class="inline-block bg-gray-200 text-gray-700 text-xs px-2 py-1 rounded">
                            Tidak Berkategori
                        </span>
                    </td>
                </tr>

                <tr>
                    <th class="py-3 pr-4 text-gray-500">Harga</th>
                    <td class="py-3"
                        th:text="${'Rp ' + #numbers.formatDecimal(product.price, 0, 'COMMA')}">
                        Rp 0
                    </td>
                </tr>

                <tr>
                    <th class="py-3 pr-4 text-gray-500">Stok</th>
                    <td class="py-3" th:text="${product.stock}">0</td>
                </tr>

                <tr>
                    <th class="py-3 pr-4 text-gray-500">Status</th>
                    <td class="py-3">
                        <span th:if="${product.active}"
                              class="inline-block bg-green-100 text-green-700 text-xs px-2 py-1 rounded">
                            Aktif
                        </span>
                        <span th:unless="${product.active}"
                              class="inline-block bg-red-100 text-red-700 text-xs px-2 py-1 rounded">
                            Tidak Aktif
                        </span>
                    </td>
                </tr>

                <tr>
                    <th class="py-3 pr-4 text-gray-500">Tanggal Dibuat</th>
                    <td class="py-3" th:text="${product.createdAt}">-</td>
                </tr>

                <tr>
                    <th class="py-3 pr-4 text-gray-500">Deskripsi</th>
                    <td class="py-3"
                        th:text="${product.description != null ? product.description : '-'}">
                        -
                    </td>
                </tr>

                </tbody>
            </table>
        </div>
    </div>

    <!-- Action Buttons -->
    <div class="flex gap-3 mt-6">
        <a th:href="@{/products/{id}/edit(id=${product.id})}"
           class="bg-yellow-500 text-white px-4 py-2 rounded-md
                  hover:bg-yellow-600 transition">
            Edit
        </a>

        <a th:href="@{/products}"
           class="bg-gray-500 text-white px-4 py-2 rounded-md
                  hover:bg-gray-600 transition">
            Kembali ke Daftar
        </a>
    </div>

</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
