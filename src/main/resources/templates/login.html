<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Product CRUD</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center px-4">

<div class="w-full max-w-md bg-white rounded-lg shadow-lg p-8">

    <h3 class="text-2xl font-bold text-center mb-6">Login</h3>

    <!-- Error: username/password salah -->
    <div th:if="${param.error}"
         class="mb-4 p-3 rounded bg-red-100 text-red-700 text-sm">
        Username atau password salah!
    </div>

    <!-- Info: berhasil logout -->
    <div th:if="${param.logout}"
         class="mb-4 p-3 rounded bg-blue-100 text-blue-700 text-sm">
        Berhasil logout.
    </div>

    <!-- Success: registrasi berhasil -->
    <div th:if="${success}"
         class="mb-4 p-3 rounded bg-green-100 text-green-700 text-sm"
         th:text="${success}">
    </div>

    <form th:action="@{/login}" method="post" class="space-y-4">

        <div>
            <label for="username" class="block text-sm font-medium text-gray-700 mb-1">
                Username
            </label>
            <input type="text"
                   id="username"
                   name="username"
                   required
                   autofocus
                   placeholder="Masukkan username"
                   class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
        </div>

        <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
                Password
            </label>
            <input type="password"
                   id="password"
                   name="password"
                   required
                   placeholder="Masukkan password"
                   class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
        </div>

        <button type="submit"
                class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold
                       hover:bg-blue-700 transition">
            Login
        </button>
    </form>

    <div class="text-center mt-4 text-sm text-gray-600">
        Belum punya akun?
        <a th:href="@{/register}" class="text-blue-600 hover:underline">
            Daftar di sini
        </a>
    </div>

</div>

</body>
</html>
