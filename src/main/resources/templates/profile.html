<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: header}">
    <title>My Profile - Product CRUD</title>
</head>

<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-4">
    <div class="row">

        <!-- SIDEBAR / STATISTIK -->
        <div class="col-md-4 mb-4">
            <div class="card shadow-sm">
                <div class="card-body text-center">
                    <div class="display-1 text-primary">👤</div>
                    <h4 th:text="${user.username}">username</h4>
                    <p class="text-muted" th:text="${user.email}">email@example.com</p>
                    <hr>

                    <div class="row">
                        <div class="col-6">
                            <h5 th:text="${totalProducts}">0</h5>
                            <small class="text-muted">Total Produk</small>
                        </div>
                        <div class="col-6">
                            <h5 th:text="${activeProducts}">0</h5>
                            <small class="text-muted">Produk Aktif</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- FORM UPDATE PROFILE -->
        <div class="col-md-8 mb-4">

            <!-- Flash Messages -->
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
                <span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Edit Profile Form -->
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">✏ Edit Profile</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/profile/update}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" class="form-control" th:value="${user.username}" disabled>
                            <small class="text-muted">Username tidak dapat diubah</small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Nama Lengkap</label>
                            <input type="text" name="name" class="form-control"
                                   th:value="${user.name}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control"
                                   th:value="${user.email}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">No. Telepon</label>
                            <input type="tel" name="phone" class="form-control"
                                   th:value="${user.phone}">
                        </div>

                        <button type="submit" class="btn btn-primary">
                             Simpan Perubahan
                        </button>
                    </form>
                </div>
            </div>

            <!-- Change Password Form -->
            <div class="card shadow-sm">
                <div class="card-header bg-warning text-dark">
                    <h5 class="mb-0"> Ganti Password</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/profile/change-password}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Password Saat Ini</label>
                            <input type="password" name="currentPassword" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password Baru</label>
                            <input type="password" name="newPassword" class="form-control" required>
                            <small class="text-muted">Minimal 6 karakter</small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Konfirmasi Password Baru</label>
                            <input type="password" name="confirmPassword" class="form-control" required>
                        </div>

                        <button type="submit" class="btn btn-warning">
                            🔄 Ganti Password
                        </button>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
